<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <!-- Force landscape on mobile when in game -->
  <style>
    @media screen and (max-width:680px) and (orientation:portrait) {
      body.in-game::after {
        content:'↻ TOURNE TON TÉLÉPHONE';
        position:fixed; inset:0; background:#0a0a0f;
        display:flex; align-items:center; justify-content:center;
        font-family:'Press Start 2P',monospace; font-size:0.55rem;
        color:var(--yellow); text-align:center; padding:20px;
        z-index:99999; white-space:pre-wrap;
        line-height:2;
      }
    }
  </style>
<title>💣 BomberOnline</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --panel: #13131f; --border: #2a2a4a;
  --red: #ff3e6c; --cyan: #00e5ff; --yellow: #ffe600; --green: #39ff14;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); font-family:'Press Start 2P',monospace; color:white; min-height:100vh; display:flex; flex-direction:column; align-items:center; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px); pointer-events:none; z-index:9999; }

/* HEADER — visible uniquement hors jeu */
.header { text-align:center; padding:20px 0 12px; }
.header h1 { font-size:clamp(1rem,4vw,1.8rem); color:var(--yellow); text-shadow:0 0 10px var(--yellow),3px 3px 0 #8a7000; letter-spacing:3px; }
.header p { font-size:0.38rem; color:var(--cyan); margin-top:6px; letter-spacing:3px; opacity:0.6; }
body.in-game .header { display:none; }

/* BANDE COLLAPSIBLE en jeu */
.game-topbar {
  display:none; width:100%; background:var(--panel);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
body.in-game .game-topbar { display:block; }
.topbar-toggle {
  width:100%; background:none; border:none; color:var(--cyan);
  font-family:'Press Start 2P',monospace; font-size:0.28rem;
  padding:3px 8px; cursor:pointer; display:flex; align-items:center; justify-content:space-between;
  letter-spacing:1px;
}
.topbar-toggle .tbarrow { transition:transform 0.2s; display:inline-block; }
.topbar-toggle.collapsed .tbarrow { transform:rotate(180deg); }
.topbar-content {
  display:flex; flex-wrap:wrap; gap:6px; padding:4px 8px 6px;
  transition:max-height 0.25s ease, opacity 0.25s;
  max-height:120px; overflow:hidden; opacity:1;
}
.topbar-content.collapsed { max-height:0; opacity:0; padding:0 8px; }
.topbar-section { display:flex; flex-direction:column; gap:2px; min-width:90px; }
.topbar-label { font-size:0.22rem; color:var(--cyan); letter-spacing:1px; margin-bottom:1px; opacity:0.7; }
.topbar-players { display:flex; flex-wrap:wrap; gap:4px; }
.topbar-pstat { display:flex; align-items:center; gap:3px; font-size:0.26rem; background:#0d0d1a; border:1px solid var(--border); border-radius:2px; padding:2px 4px; }
.topbar-pstat.dead { opacity:0.35; }
.topbar-pstat.dead .tps-name { text-decoration:line-through; }
.topbar-pstat.me .tps-name { color:var(--yellow); }
.tps-avatar { font-size:0.7rem; }
.tps-name { max-width:55px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#bbb; }
.tps-hp { color:var(--red); font-size:0.22rem; margin-left:2px; }
.topbar-stuff { display:flex; gap:6px; align-items:center; font-size:0.26rem; color:#888; }
.topbar-stuff .tv { color:var(--yellow); margin-left:2px; }

.screen { display:none; width:100%; max-width:860px; padding:0 12px 20px; }
.screen.active { display:flex; flex-direction:column; align-items:center; }
.card { background:var(--panel); border:2px solid var(--border); border-radius:4px; padding:24px; width:100%; max-width:460px; position:relative; }
.card::before { content:''; position:absolute; inset:-1px; border-radius:4px; background:linear-gradient(135deg,var(--red),var(--cyan),var(--yellow),var(--red)); background-size:300%; animation:ba 3s linear infinite; z-index:-1; }
@keyframes ba { 0%{background-position:0%} 100%{background-position:300%} }
.field { margin-bottom:14px; }
.field label { display:block; font-size:0.42rem; color:var(--cyan); margin-bottom:6px; letter-spacing:2px; }
.field input,.field select { width:100%; background:#0d0d1a; border:2px solid var(--border); color:white; font-family:'Press Start 2P',monospace; font-size:0.5rem; padding:11px 12px; border-radius:3px; outline:none; }
.field input:focus,.field select:focus { border-color:var(--cyan); }
.field select option { background:#0d0d1a; }
.btn { width:100%; padding:13px; font-family:'Press Start 2P',monospace; font-size:0.5rem; border:none; border-radius:3px; cursor:pointer; letter-spacing:2px; margin-bottom:8px; transition:opacity 0.15s,transform 0.1s; }
.btn:hover { opacity:0.85; transform:translateY(-1px); }
.btn:active { transform:scale(0.97); }
.btn-red { background:var(--red); color:white; box-shadow:0 0 10px rgba(255,62,108,0.4); }
.btn-cyan { background:transparent; color:var(--cyan); border:2px solid var(--cyan); }
.btn-green { background:var(--green); color:#000; box-shadow:0 0 10px rgba(57,255,20,0.4); }
.btn-grey { background:#1e1e30; color:#888; border:2px solid #333; }
.btn-danger { background:#ff1744; color:white; }
.sep { text-align:center; font-size:0.38rem; color:#333; margin:10px 0; letter-spacing:3px; }
.rooms-list { width:100%; max-height:180px; overflow-y:auto; background:#0d0d1a; border:2px solid var(--border); border-radius:3px; margin-bottom:10px; }
.room-item { display:flex; justify-content:space-between; align-items:center; padding:9px 12px; border-bottom:1px solid var(--border); cursor:pointer; font-size:0.38rem; transition:background 0.1s; }
.room-item:last-child { border-bottom:none; }
.room-item:hover { background:rgba(0,229,255,0.06); }
.room-item .rname { color:var(--cyan); }
.room-item .rinfo { color:#555; }
.wait-card { background:var(--panel); border:2px solid var(--border); border-radius:4px; padding:20px; width:100%; max-width:520px; text-align:center; }
.code-display { font-size:2rem; color:var(--yellow); text-shadow:0 0 10px var(--yellow); letter-spacing:8px; margin:12px 0; }
.players-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:16px 0; }
.pslot { background:#0d0d1a; border:2px solid var(--border); border-radius:4px; padding:10px 4px; text-align:center; min-height:72px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; font-size:0.35rem; }
.pslot.filled { border-color:var(--green); background:rgba(57,255,20,0.05); }
.pslot .pavatar { font-size:1.5rem; }
.pslot .pname { color:white; word-break:break-all; }
.pslot .pempty { color:#333; }
.pslot.bot { border-color:#da77f2; background:rgba(218,119,242,0.05); }
.pslot.bot .pname { color:#da77f2; }
.slot-actions { display:flex; gap:3px; margin-top:4px; width:100%; }
.slot-btn { flex:1; background:#1a1a2e; border:1px solid var(--border); color:#aaa; font-family:"Press Start 2P",monospace; font-size:0.28rem; padding:3px 2px; border-radius:2px; cursor:pointer; transition:all 0.15s; }
.slot-btn:hover { border-color:var(--cyan); color:var(--cyan); }
.slot-btn.active { border-color:var(--green); color:var(--green); background:rgba(57,255,20,0.08); }
.wait-status { font-size:0.38rem; color:#555; margin:6px 0; }
.chat-box { background:var(--panel); border:2px solid var(--border); border-radius:3px; padding:8px; width:100%; max-width:520px; margin-top:10px; }
.chat-msgs { height:70px; overflow-y:auto; font-size:0.32rem; color:#555; line-height:1.9; margin-bottom:5px; }
.chat-msgs .cm-player { color:var(--cyan); }
.chat-msgs .cm-system { color:#444; font-style:italic; }
.chat-row { display:flex; gap:5px; }
.chat-row input { flex:1; background:#0d0d1a; border:1px solid var(--border); color:white; font-family:'Press Start 2P',monospace; font-size:0.35rem; padding:6px 8px; border-radius:2px; outline:none; }
.chat-row button { background:var(--cyan); color:#000; font-family:'Press Start 2P',monospace; font-size:0.32rem; padding:6px 10px; border:none; border-radius:2px; cursor:pointer; white-space:nowrap; }
/* GAME SCREEN — maximise l'espace canvas */
#screen-game {
  flex-direction:column; align-items:center; gap:4px;
  padding:0 4px 8px; width:100%; max-width:none;
}
/* sidebar cachée en jeu — infos remontées dans topbar */
.sidebar { display:none; }
.stat-card { background:var(--panel); border:2px solid var(--border); border-radius:3px; padding:8px; }
.stat-title { font-size:0.3rem; color:var(--cyan); letter-spacing:2px; margin-bottom:7px; }
.pstat { display:flex; align-items:center; gap:5px; padding:4px 0; border-bottom:1px solid var(--border); font-size:0.32rem; }
.pstat:last-child { border-bottom:none; }
.pstat.dead .psname { color:#333; text-decoration:line-through; }
.pstat.me .psname { color:var(--yellow); }
.pstat .psavatar { font-size:0.9rem; }
.pstat .psname { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#bbb; }
.pstat .pshp { color:var(--red); font-size:0.28rem; }
.pu-row { display:flex; justify-content:space-between; font-size:0.32rem; padding:2px 0; color:#888; }
.pu-val { color:var(--yellow); }
.game-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; width:100%; }
.game-hud { display:flex; align-items:center; gap:10px; font-size:0.34rem; }
.hud-timer { color:var(--yellow); font-size:0.55rem; text-shadow:0 0 8px var(--yellow); }
.hud-label { color:#444; }
#gameCanvas { border:3px solid var(--border); box-shadow:0 0 25px rgba(255,62,108,0.15); display:block; image-rendering:pixelated; max-width:100%; }
.controls-hint { font-size:0.28rem; color:#333; letter-spacing:1px; }
.controls-hint span { color:var(--cyan); }
.overlay-wrap { position:relative; display:inline-block; max-width:100%; }
.game-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.88); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:10; text-align:center; }
.game-overlay.show { display:flex; }
.ov-title { font-size:clamp(0.8rem,3vw,1.4rem); margin-bottom:12px; }
.ov-sub { font-size:0.42rem; color:#666; margin-bottom:16px; }

/* CONTROLES MOBILE — collés sur les côtés du canvas en overlay */
.mobile-ctrl { display:none; }
.mbtn { background:rgba(255,255,255,0.07); border:2px solid var(--border); border-radius:4px; color:white; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
.mbtn:active { background:rgba(255,62,108,0.3); }

/* Bouton quitter en jeu (desktop) */
.btn-quit-game {
  position:fixed; bottom:16px; right:16px;
  background:#1e1e30; color:#ff3e6c;
  border:2px solid #ff3e6c; border-radius:3px;
  font-family:'Press Start 2P',monospace; font-size:0.32rem;
  padding:8px 12px; cursor:pointer; letter-spacing:1px;
  z-index:200; opacity:0.75; transition:opacity 0.15s;
  display:none;
}
.btn-quit-game:hover { opacity:1; }
body.in-game .btn-quit-game { display:block; }

@media(max-width:680px) {
  body.in-game { overflow:hidden; }
  .controls-hint { display:none; }

  /* overlay-wrap = conteneur relatif qui enveloppe canvas + contrôles */
  .overlay-wrap {
    position:relative;
    display:block; /* pas inline-block pour bien prendre la largeur */
    line-height:0; /* évite l'espace sous le canvas */
  }

  /* Le canvas prend toute la largeur disponible */
  #gameCanvas { width:100% !important; height:auto !important; }

  /* Contrôles en absolu sur le canvas */
  .mobile-ctrl {
    display:block !important;
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    /* PAS de pointer-events:none global — on laisse tout passer naturellement */
  }

  /* D-PAD — coin bas-gauche */
  .mobile-dpad {
    position:absolute;
    left:6px;
    bottom:8px;
    display:grid;
    grid-template-columns:repeat(3,50px);
    grid-template-rows:repeat(3,50px);
    gap:3px;
  }
  .mobile-dpad .mbtn {
    background:rgba(0,0,0,0.6);
    border:2px solid rgba(255,255,255,0.25);
    border-radius:6px;
    font-size:1.3rem;
  }
  .mobile-dpad .mbtn:active { background:rgba(0,229,255,0.4); border-color:var(--cyan); }
  /* Cellule vide du dpad — pas cliquable */
  .mobile-dpad .dpad-empty { background:none; border:none; pointer-events:none; }

  /* BOMBE — coin bas-droit */
  .mobile-bomb-area {
    position:absolute;
    right:8px;
    bottom:8px;
  }
  .mbtn-bomb-big {
    width:82px; height:82px;
    background:rgba(0,0,0,0.6);
    border:3px solid rgba(255,62,108,0.8);
    border-radius:50%;
    color:white; font-size:2.2rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
    box-shadow:0 0 16px rgba(255,62,108,0.4);
  }
  .mbtn-bomb-big:active { background:rgba(255,62,108,0.55); transform:scale(0.91); }

  /* Quitter — petit bouton en haut à droite */
  .btn-quit-game {
    bottom:auto; top:8px; right:8px;
    font-size:0.24rem; padding:5px 8px;
    opacity:0.6;
  }
}
.podium { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:16px 0; }
.pod-card { background:var(--panel); border:2px solid var(--border); border-radius:4px; padding:14px 18px; text-align:center; min-width:90px; }
.pod-card.p1{border-color:var(--yellow);} .pod-card.p2{border-color:#aaa;} .pod-card.p3{border-color:#c0622f;}
.pod-rank{font-size:1.6rem;} .pod-name{font-size:0.38rem;color:#ccc;margin:5px 0;} .pod-kills{font-size:0.34rem;color:var(--cyan);}
.toasts { position:fixed; top:16px; right:16px; z-index:99999; display:flex; flex-direction:column; gap:6px; }
.toast { background:var(--panel); border:2px solid var(--cyan); border-radius:3px; padding:9px 14px; font-size:0.38rem; color:var(--cyan); animation:tin 0.3s ease,tout 0.3s ease 2.5s forwards; max-width:260px; }
.toast.err{border-color:var(--red);color:var(--red);} .toast.ok{border-color:var(--green);color:var(--green);}
@keyframes tin{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tout{to{transform:translateX(80px);opacity:0}}
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:#0d0d1a;} ::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>
<body>
<div class="toasts" id="toasts"></div>

<!-- BANDE INFOS EN JEU (collapsible) -->
<div class="game-topbar" id="game-topbar">
  <button class="topbar-toggle" id="topbar-toggle">
    <span id="topbar-summary">JOUEURS &nbsp;|&nbsp; STUFF</span>
    <span class="tbarrow">▲</span>
  </button>
  <div class="topbar-content" id="topbar-content">
    <div class="topbar-section">
      <div class="topbar-label">JOUEURS</div>
      <div class="topbar-players" id="tb-players"></div>
    </div>
    <div class="topbar-section">
      <div class="topbar-label">MON STUFF</div>
      <div class="topbar-stuff">
        💣<span class="tv" id="tb-bombs">1</span>
        &nbsp;🔥<span class="tv" id="tb-flame">2</span>
        &nbsp;💨<span class="tv" id="tb-speed">1</span>
      </div>
    </div>
  </div>
</div>
<div class="header">
  <h1>BOMBER ONLINE</h1>
  <p>MULTIPLAYER 2D PIXEL BATTLE</p>
</div>

<!-- MENU -->
<div class="screen active" id="screen-menu">
  <div class="card">
    <div class="field">
      <label>PSEUDO</label>
      <input type="text" id="inp-pseudo" placeholder="BomberKing" maxlength="14">
    </div>
    <div class="field">
      <label>PERSONNAGE</label>
      <select id="inp-avatar">
        <option value="💣">💣 Bomber Classic</option>
        <option value="🤖">🤖 Robo Bomber</option>
        <option value="👾">👾 Alien Bomber</option>
        <option value="🐱">🐱 Cat Bomber</option>
        <option value="🦊">🦊 Fox Bomber</option>
        <option value="🐸">🐸 Frog Bomber</option>
        <option value="🐼">🐼 Panda Bomber</option>
        <option value="🦄">🦄 Unicorn Bomber</option>
      </select>
    </div>
    <button class="btn btn-red" id="btn-creer">CREER UNE PARTIE</button>
    <div class="sep">ou rejoindre</div>
    <div class="field">
      <label>CODE DE SALLE</label>
      <input type="text" id="inp-code" placeholder="ABCD" maxlength="4" style="text-transform:uppercase;letter-spacing:6px;font-size:0.8rem">
    </div>
    <button class="btn btn-cyan" id="btn-rejoindre">REJOINDRE</button>
    <div class="sep">salles ouvertes</div>
    <div class="rooms-list" id="rooms-list">
      <div style="padding:14px;text-align:center;font-size:0.35rem;color:#333">Chargement...</div>
    </div>
    <button class="btn btn-grey" id="btn-refresh" style="font-size:0.38rem;padding:9px">ACTUALISER</button>
  </div>
</div>

<!-- WAITING -->
<div class="screen" id="screen-waiting">
  <div class="wait-card">
    <div style="font-size:0.35rem;color:#444;letter-spacing:2px">CODE DE LA SALLE</div>
    <div class="code-display" id="code-display">----</div>
    <div style="font-size:0.34rem;color:#444;margin-bottom:4px">Partage ce code avec tes amis !</div>
    <div class="players-grid" id="players-grid"></div>
    <div class="wait-status" id="wait-status">En attente...</div>
    <button class="btn btn-green" id="btn-launch" style="margin-top:8px">LANCER LA PARTIE</button>
    <button class="btn btn-danger" id="btn-quit-wait">QUITTER</button>
  </div>
  <div class="chat-box">
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-row">
      <input type="text" id="chat-inp" placeholder="Message..." maxlength="60">
      <button id="btn-chat-send">ENVOYER</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div class="game-wrap">
    <div class="game-hud">
      <span class="hud-label">TEMPS</span>
      <span class="hud-timer" id="hud-timer">03:00</span>
      <span class="hud-label" id="hud-alive"></span>
    </div>
    <div class="overlay-wrap">
      <canvas id="gameCanvas"></canvas>
      <div class="game-overlay" id="game-overlay">
        <div class="ov-title" id="ov-title">GAME OVER</div>
        <div class="ov-sub" id="ov-sub">Resultats dans 3s...</div>
        <button class="btn btn-grey" id="btn-menu-ov" style="width:180px;margin-top:8px">MENU</button>
      </div>
      <!-- Contrôles mobiles en overlay sur les bords du canvas -->
      <div class="mobile-ctrl" id="mobile-ctrl">
        <div class="mobile-dpad">
          <div class="dpad-empty"></div><div class="mbtn" id="mb-up">▲</div><div class="dpad-empty"></div>
          <div class="mbtn" id="mb-left">◀</div><div class="dpad-empty"></div><div class="mbtn" id="mb-right">▶</div>
          <div class="dpad-empty"></div><div class="mbtn" id="mb-down">▼</div><div class="dpad-empty"></div>
        </div>
        <div class="mobile-bomb-area">
          <div class="mbtn-bomb-big" id="mb-bomb">💣</div>
        </div>
      </div>
    </div>
    <div class="controls-hint"><span>FLECHES/ZQSD</span> MOVE | <span>ESPACE</span> BOMBE</div>
  </div>
</div>

<!-- Bouton quitter visible pendant la partie -->
<button class="btn-quit-game" id="btn-quit-game">✕ QUITTER</button>

<!-- RESULTS -->
<div class="screen" id="screen-results">
  <div style="text-align:center;padding:16px 0">
    <div style="font-size:clamp(0.7rem,3vw,1.4rem);color:var(--yellow);text-shadow:0 0 10px var(--yellow);margin-bottom:4px">GAME OVER</div>
    <div style="font-size:0.38rem;color:#444;margin-bottom:16px">RESULTATS</div>
    <div class="podium" id="result-podium"></div>
    <button class="btn btn-red" id="btn-menu-res" style="max-width:260px;margin-top:12px">RETOUR AU MENU</button>
  </div>
</div>

<script>

var SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuemJjbnJscGVldnJ4bXJ0aW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDE0OTgsImV4cCI6MjA4ODM3NzQ5OH0.6VNz_v-TD3RLaWe4QLZun4jReYrKHMdWjZ7dprZaLgA";

var COLS=15, ROWS=13, CELL=44;

var SPAWNS=[[1,1],[COLS-2,1],[1,ROWS-2],[COLS-2,ROWS-2],[1,6],[COLS-2,6],[7,1],[7,ROWS-2]];
var P_COLORS=["#ff3e6c","#00e5ff","#ffe600","#39ff14","#ff6b35","#da77f2","#ff8fab","#94d2bd"];
var P_BG=["#3d0012","#001a1f","#1a1600","#001a00","#1a0c00","#1a0025","#1a0012","#001a16"];
var MOVE_DELAYS=[220,180,140,110];

var lastMove=0, lastBomb=0;

// MAP
function generateMap(seed) {
  var s=seed||12345;
  function rng(){ s=((s*1664525)+1013904223)&0xffffffff; return (s>>>0)/4294967295; }
  var map=[];
  for(var r=0;r<ROWS;r++){
    map.push([]);
    for(var c=0;c<COLS;c++){
      if(r===0||r===ROWS-1||c===0||c===COLS-1){map[r].push(T_WALL);continue;}
      if(r%2===0&&c%2===0){map[r].push(T_WALL);continue;}
      var isSp=SPAWNS.some(function(sp){return Math.abs(c-sp[0])<=1&&Math.abs(r-sp[1])<=1;});
      if(isSp){map[r].push(T_EMPTY);continue;}
      map[r].push(rng()<0.65?T_BLOCK:T_EMPTY);
    }
  }
  return map;
}

// DRAW
function render(){
  ctx.clearRect(0,0,W,H);
  if(!gs.map.length) return;
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var x=c*CELL,y=r*CELL,t=(gs.map[r]&&gs.map[r][c]!==undefined)?gs.map[r][c]:T_WALL;
      if(t===T_WALL){ ctx.fillStyle="#0d0d1a"; ctx.fillRect(x,y,CELL,CELL); ctx.fillStyle="#1e1e3a"; ctx.fillRect(x+2,y+2,CELL-4,CELL/2-2); ctx.strokeStyle="#2a2a4a"; ctx.lineWidth=1; ctx.strokeRect(x+.5,y+.5,CELL-1,CELL-1); }
      else if(t===T_BLOCK){ ctx.fillStyle="#3d2b1f"; ctx.fillRect(x,y,CELL,CELL); ctx.fillStyle="#5c4030"; ctx.fillRect(x+3,y+3,CELL-6,9); ctx.strokeStyle="#2a1a10"; ctx.lineWidth=1; ctx.strokeRect(x+.5,y+.5,CELL-1,CELL-1); }
      else { ctx.fillStyle=((r+c)%2===0)?"#16213e":"#1a2540"; ctx.fillRect(x,y,CELL,CELL); }
    }
  }
  gs.powerups.forEach(function(pu){ var x=pu.x*CELL,y=pu.y*CELL; ctx.fillStyle="rgba(255,230,0,0.12)"; ctx.fillRect(x+4,y+4,CELL-8,CELL-8); ctx.font=(CELL-14)+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(pu.type===PU_BOMB?"💣":pu.type===PU_FLAME?"🔥":"💨",x+CELL/2,y+CELL/2); });
  var now=Date.now();
  gs.bombs.forEach(function(b){ var x=b.x*CELL,y=b.y*CELL,age=b.placedAt?(now-b.placedAt)/b.timer:0,pulse=0.85+Math.sin(age*Math.PI*6)*0.15; ctx.save(); ctx.translate(x+CELL/2,y+CELL/2); ctx.scale(pulse,pulse); ctx.fillStyle="#222"; ctx.beginPath(); ctx.arc(0,0,CELL/2-6,0,Math.PI*2); ctx.fill(); ctx.strokeStyle="#ff3e6c"; ctx.lineWidth=2; ctx.stroke(); ctx.strokeStyle="#ff8c00"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(2,-CELL/2+10); ctx.bezierCurveTo(8,-CELL/2+4,10,-CELL/2-4,6,-CELL/2-8); ctx.stroke(); ctx.fillStyle="#ffe600"; ctx.beginPath(); ctx.arc(6,-CELL/2-8,3,0,Math.PI*2); ctx.fill(); ctx.restore(); });
  gs.explosions.forEach(function(ex){ if(!ex.startTime) return; var age=(now-ex.startTime)/700; if(age>1) return; var al=1-age,x=ex.x*CELL,y=ex.y*CELL; var g=ctx.createRadialGradient(x+CELL/2,y+CELL/2,2,x+CELL/2,y+CELL/2,CELL/2); g.addColorStop(0,"rgba(255,230,0,"+al+")"); g.addColorStop(0.4,"rgba(255,100,0,"+(al*0.9)+")"); g.addColorStop(1,"rgba(255,30,0,0)"); ctx.fillStyle=g; if(ex.type==="center"){ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,CELL/2*0.9,0,Math.PI*2);ctx.fill();}else{ctx.fillRect(x+4,y+4,CELL-8,CELL-8);} });
  Object.values(gs.players).forEach(function(p){ if(p.dead) return; var px=p.x*CELL,py=p.y*CELL,idx=p.spawnIdx||0,col=P_COLORS[idx%8],bg=P_BG[idx%8]; ctx.fillStyle="rgba(0,0,0,0.35)"; ctx.beginPath(); ctx.ellipse(px+CELL/2,py+CELL-4,CELL/2-6,5,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle=bg; ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(px+4,py+8,CELL-8,CELL-14,8); ctx.fill(); ctx.stroke(); ctx.font=(CELL-18)+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(p.avatar||"💣",px+CELL/2,py+CELL/2-2); if(p.id===myId){ctx.fillStyle=col;ctx.fillRect(px+2,py-14,CELL-4,12);ctx.fillStyle="black";ctx.font="bold 7px monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText((p.pseudo||"").slice(0,8),px+CELL/2,py-8);} for(var i=0;i<3;i++){ctx.fillStyle=i<p.hp?col:"#333";ctx.beginPath();ctx.arc(px+8+i*12,py+CELL-6,4,0,Math.PI*2);ctx.fill();} });
}

// GAME LOGIC
function initGame(players){
  gs.map=generateMap(Date.now()%99999); gs.bombs=[]; gs.explosions=[]; gs.powerups=[];
  gs.running=true; gs.timeLeft=GAME_DURATION; gs.players={};
  var ids=Object.keys(players);
  ids.forEach(function(id,i){ var sp=SPAWNS[i%SPAWNS.length]; gs.players[id]={id:id,pseudo:players[id].pseudo,avatar:players[id].avatar,x:sp[0],y:sp[1],hp:3,bombs:1,flame:2,speed:1,kills:0,dead:false,spawnIdx:i,moveTimer:0}; });
}

function tryMove(pid,dir){
  var p=gs.players[pid]; if(!p||p.dead) return false;
  var now=Date.now(), delay=MOVE_DELAYS[Math.min(p.speed-1,3)];
  if(now-(p.moveTimer||0)<delay) return false;
  var nx=p.x,ny=p.y;
  if(dir==="up") ny--; else if(dir==="down") ny++; else if(dir==="left") nx--; else if(dir==="right") nx++;
  if(nx<0||ny<0||nx>=COLS||ny>=ROWS) return false;
  var t=gs.map[ny][nx];
  if(t===T_WALL||t===T_BLOCK) return false;
  if(gs.bombs.some(function(b){return b.x===nx&&b.y===ny;})) return false;
  p.x=nx; p.y=ny; p.moveTimer=now;
  var pi=gs.powerups.findIndex(function(pu){return pu.x===nx&&pu.y===ny;});
  if(pi!==-1){ var pu=gs.powerups.splice(pi,1)[0]; if(pu.type===PU_BOMB) p.bombs=Math.min(p.bombs+1,8); else if(pu.type===PU_FLAME) p.flame=Math.min(p.flame+1,8); else p.speed=Math.min(p.speed+1,4); }
  return true;
}

function tryPlaceBomb(pid){
  var p=gs.players[pid]; if(!p||p.dead) return false;
  if(gs.bombs.filter(function(b){return b.ownerId===pid;}).length>=p.bombs) return false;
  if(gs.bombs.some(function(b){return b.x===p.x&&b.y===p.y;})) return false;
  var b={id:Math.random().toString(36).slice(2,8),x:p.x,y:p.y,flame:p.flame,ownerId:pid,timer:3000,placedAt:Date.now()};
  gs.bombs.push(b);
  setTimeout(function(){explodeBomb(b.id);},b.timer);
  return true;
}

function explodeBomb(bombId){
  var bi=gs.bombs.findIndex(function(b){return b.id===bombId;}); if(bi===-1) return;
  var bomb=gs.bombs.splice(bi,1)[0], now=Date.now();
  var cells=[{x:bomb.x,y:bomb.y,type:"center"}];
  [[0,-1],[0,1],[-1,0],[1,0]].forEach(function(d){
    for(var i=1;i<=bomb.flame;i++){
      var nx=bomb.x+d[0]*i,ny=bomb.y+d[1]*i;
      if(nx<0||ny<0||nx>=COLS||ny>=ROWS) break;
      var t=gs.map[ny][nx]; if(t===T_WALL) break;
      cells.push({x:nx,y:ny,type:"branch"});
      if(t===T_BLOCK){
        gs.map[ny][nx]=T_EMPTY;
        if(Math.random()<0.35){ var types=[PU_BOMB,PU_FLAME,PU_SPEED]; gs.powerups.push({x:nx,y:ny,type:types[Math.floor(Math.random()*3)]}); }
        break;
      }
      var ci=gs.bombs.findIndex(function(b){return b.x===nx&&b.y===ny;}); if(ci!==-1){ var cid=gs.bombs[ci].id; setTimeout(function(){explodeBomb(cid);},100); }
    }
  });
  cells.forEach(function(c){gs.explosions.push({x:c.x,y:c.y,type:c.type,startTime:now});});
  setTimeout(function(){gs.explosions=gs.explosions.filter(function(e){return e.startTime!==now;});},800);
  cells.forEach(function(c){ Object.values(gs.players).forEach(function(p){ if(p.dead) return; if(p.x===c.x&&p.y===c.y){ p.hp--; if(p.hp<=0){ p.dead=true; var bm=gs.players[bomb.ownerId]; if(bm&&bm.id!==p.id) bm.kills++; checkVictory(); } } }); });
  if(isHost) broadcastState();
}

function checkVictory(){
  var alive=Object.values(gs.players).filter(function(p){return !p.dead;});
  if(alive.length<=1){ gs.running=false; if(isHost) setTimeout(function(){ broadcastState(); var winnerId=alive.length?alive[0].id:null; broadcastEvent("game_over",{winner:winnerId}); endGame(winnerId); },500); }
}

function startGameLoop(){
  if(gameLoop) clearInterval(gameLoop);
  gameLoop=setInterval(function(){
    if(!gs.running) return;
    if(isHost) processInput(); else processLocalInput();
    render(); updateHUD();
    if(isHost&&Date.now()%(TICK*3)<TICK) broadcastState();
  },TICK);
  if(isHost) timerInterval=setInterval(function(){ if(!gs.running) return; gs.timeLeft--; if(gs.timeLeft<=0){gs.running=false;broadcastEvent("game_over",{winner:null});endGame(null);} },1000);
}

function processInput(){
  var p=gs.players[myId]; if(!p||p.dead||!gs.running) return;
  var now=Date.now();
  if(keys.up) tryMove(myId,"up"); else if(keys.down) tryMove(myId,"down"); else if(keys.left) tryMove(myId,"left"); else if(keys.right) tryMove(myId,"right");
  if(keys.bomb&&now-lastBomb>400){ tryPlaceBomb(myId); lastBomb=now; }
}

function processLocalInput(){
  var now=Date.now(),dir=null;
  if(keys.up) dir="up"; else if(keys.down) dir="down"; else if(keys.left) dir="left"; else if(keys.right) dir="right";
  if(dir&&now-lastMove>80){ lastMove=now; broadcastEvent("player_input",{dir:dir,pid:myId}); }
  if(keys.bomb&&now-lastBomb>400){ lastBomb=now; broadcastEvent("player_input",{bomb:true,pid:myId}); }
}

function updateHUD(){
  var tl=gs.timeLeft; document.getElementById("hud-timer").textContent=pad(Math.floor(tl/60))+":"+pad(tl%60);
  var alive=Object.values(gs.players).filter(function(p){return !p.dead;}).length;
  document.getElementById("hud-alive").textContent=alive+" en vie";
  var me=gs.players[myId];
  if(me){
    document.getElementById("tb-bombs").textContent=me.bombs;
    document.getElementById("tb-flame").textContent=me.flame;
    document.getElementById("tb-speed").textContent=me.speed;
    // compat with old IDs in case anything references them
    var pb=document.getElementById("pu-bombs"); if(pb) pb.textContent=me.bombs;
    var pf=document.getElementById("pu-flame"); if(pf) pf.textContent=me.flame;
    var ps=document.getElementById("pu-speed"); if(ps) ps.textContent=me.speed;
  }
  document.getElementById("tb-players").innerHTML=Object.values(gs.players).map(function(p){
    return '<div class="topbar-pstat'+(p.dead?" dead":"")+(p.id===myId?" me":"")+'"><span class="tps-avatar">'+p.avatar+'</span><span class="tps-name">'+p.pseudo+'</span><span class="tps-hp">'+(p.dead?"✖":"♥"+p.hp)+'</span></div>';
  }).join("");
  // legacy sidebar (hidden but keep for compat)
  var pstats=document.getElementById("players-stats");
  if(pstats) pstats.innerHTML=Object.values(gs.players).map(function(p){ return '<div class="pstat'+(p.dead?" dead":"")+(p.id===myId?" me":"")+'"><span class="psavatar">'+p.avatar+'</span><span class="psname">'+p.pseudo+'</span><span class="pshp">'+(p.dead?"X":"HP:"+p.hp)+'</span></div>'; }).join("");
}

function pad(n){ return String(n).padStart(2,"0"); }

// REALTIME
function subscribeRoom(code){
  if(channel){ try{channel.unsubscribe();}catch(e){} }
  channel=db.channel("bom_"+code,{config:{broadcast:{self:false}}});
  channel
    .on("broadcast",{event:"player_join"},function(msg){
      var p=msg.payload; waitingPlayers[p.id]=p; renderWaitingRoom(); addChat(p.pseudo+" a rejoint","system");
      if(isHost) setTimeout(function(){broadcastEvent("room_sync",{players:waitingPlayers});},200);
    })
    .on("broadcast",{event:"room_sync"},function(msg){
      if(!isHost){ Object.entries(msg.payload.players).forEach(function(e){waitingPlayers[e[0]]=e[1];}); renderWaitingRoom(); }
    })
    .on("broadcast",{event:"player_leave"},function(msg){
      delete waitingPlayers[msg.payload.id]; renderWaitingRoom(); addChat(msg.payload.pseudo+" a quitte","system");
    })
    .on("broadcast",{event:"chat"},function(msg){ addChat(msg.payload.pseudo+": "+msg.payload.msg,"player"); })
    .on("broadcast",{event:"game_start"},function(msg){
      gs=msg.payload.gs;
      gs.bombs.forEach(function(b){ var rem=b.timer-(Date.now()-b.placedAt); if(rem>0) setTimeout(function(){explodeBomb(b.id);},rem); });
      showScreen("screen-game"); startGameLoop();
    })
    .on("broadcast",{event:"game_state"},function(msg){
      if(!isHost){ var s=msg.payload; gs.players=s.players; gs.bombs=s.bombs; gs.explosions=s.explosions; gs.powerups=s.powerups; if(s.map) gs.map=s.map; gs.running=s.running; gs.timeLeft=s.timeLeft; if(!gs.running) endGame(null); render(); updateHUD(); }
    })
    .on("broadcast",{event:"player_input"},function(msg){ if(isHost){ var p=msg.payload; if(p.dir) tryMove(p.pid,p.dir); if(p.bomb) tryPlaceBomb(p.pid); } })
    .on("broadcast",{event:"game_over"},function(msg){ gs.running=false; endGame(msg.payload.winner); })
    .subscribe(function(status){ if(status==="SUBSCRIBED") broadcastEvent("player_join",{id:myId,pseudo:myPseudo,avatar:myAvatar}); });
}

function broadcastEvent(ev,payload){ if(!channel) return; try{channel.send({type:"broadcast",event:ev,payload:payload});}catch(e){} }
function broadcastState(){ broadcastEvent("game_state",{players:gs.players,bombs:gs.bombs,explosions:gs.explosions,powerups:gs.powerups,map:gs.map,running:gs.running,timeLeft:gs.timeLeft}); }

// DB
function dbq(fn){ try{fn();}catch(e){} }

async function nettoyerSallesObsoletes(){
  if(!db) return;
  try{
    var limiteWaiting=new Date(Date.now()-10*60*1000).toISOString();
    var limitePlaying=new Date(Date.now()-4*60*1000).toISOString();
    // Salles sans updated_at (avant migration) — toujours considérées obsolètes
    await db.from("bomberman_rooms").delete().is("updated_at",null);
    // Salles waiting trop vieilles
    await db.from("bomberman_rooms").delete().eq("status","waiting").lt("updated_at",limiteWaiting);
    // Salles playing trop vieilles
    await db.from("bomberman_rooms").delete().eq("status","playing").lt("updated_at",limitePlaying);
  }catch(e){ console.warn("nettoyage salles:",e); }
}

async function chargerSalles(){
  if(!db){document.getElementById("rooms-list").innerHTML='<div style="padding:12px;text-align:center;font-size:0.35rem;color:#333">Offline</div>';return;}
  // Nettoyer les salles obsolètes avant d'afficher
  await nettoyerSallesObsoletes();
  try{
    var res=await db.from("bomberman_rooms").select("*").eq("status","waiting").order("created_at",{ascending:false}).limit(10);
    var data=res.data, el=document.getElementById("rooms-list");
    if(!data||!data.length){el.innerHTML='<div style="padding:12px;text-align:center;font-size:0.35rem;color:#333">Aucune salle</div>';return;}
    el.innerHTML=data.map(function(r){
      var pls={}; try{pls=JSON.parse(r.players||"{}");}catch(e){}
      var age=r.updated_at?Math.floor((Date.now()-new Date(r.updated_at).getTime())/1000):null;
      var ageStr=age!==null?(age<60?age+"s":Math.floor(age/60)+"min"):"";
      return '<div class="room-item" onclick="rejoindreCode(\''+r.code+'\')"><span class="rname">'+r.code+'</span><span class="rinfo">'+Object.keys(pls).length+'/4 &nbsp;<span style="color:#333;font-size:0.28rem">'+ageStr+'</span></span></div>';
    }).join("");
  }catch(e){}
}

// UI
function creerSalle(){
  myPseudo=document.getElementById("inp-pseudo").value.trim()||"Bomber";
  myAvatar=document.getElementById("inp-avatar").value;
  try{localStorage.setItem("bom_p",myPseudo);}catch(e){}
  roomCode=genCode(); isHost=true; waitingPlayers={};
  waitingPlayers[myId]={id:myId,pseudo:myPseudo,avatar:myAvatar};
  document.getElementById("code-display").textContent=roomCode;
  showScreen("screen-waiting"); renderWaitingRoom();
  if(db) subscribeRoom(roomCode);
  if(db) db.from("bomberman_rooms").upsert({code:roomCode,host_id:myId,status:"waiting",players:JSON.stringify(waitingPlayers),created_at:new Date().toISOString(),updated_at:new Date().toISOString()}).then(function(){}).catch(function(){});
  addChat("Salle "+roomCode+" creee","system");
}

function rejoindreParCode(){
  var code=document.getElementById("inp-code").value.trim().toUpperCase();
  if(code.length!==4){toast("Code de 4 lettres requis","err");return;}
  rejoindreCode(code);
}

function rejoindreCode(code){
  myPseudo=document.getElementById("inp-pseudo").value.trim()||"Bomber";
  myAvatar=document.getElementById("inp-avatar").value;
  try{localStorage.setItem("bom_p",myPseudo);}catch(e){}
  roomCode=code; isHost=false;
  waitingPlayers[myId]={id:myId,pseudo:myPseudo,avatar:myAvatar};
  document.getElementById("code-display").textContent=roomCode;
  showScreen("screen-waiting"); renderWaitingRoom();
  if(db) subscribeRoom(roomCode);
  addChat("Rejoint salle "+roomCode,"system");
}

function renderWaitingRoom(){
  var pls=Object.values(waitingPlayers);
  var humanCount=pls.filter(function(p){return !p.isBot;}).length;
  var totalCount=pls.length;
  document.getElementById("players-grid").innerHTML=[0,1,2,3].map(function(i){
    var p=pls[i];
    if(p){
      var isBot=p.isBot;
      var removeBtn=isHost&&isBot?'<div class="slot-actions"><button class="slot-btn" onclick="retirerBot(\''+p.id+'\')" style="color:#ff3e6c;border-color:#ff3e6c">RETIRER</button></div>':""
      return '<div class="pslot '+(isBot?"bot":"filled")+'"><div class="pavatar">'+p.avatar+'</div><div class="pname">'+p.pseudo+'</div>'+removeBtn+'</div>';
    }
    var addBotBtn=isHost?'<div class="slot-actions"><button class="slot-btn" onclick="ajouterBot()">+ BOT</button></div>':'<div class="pempty">LIBRE</div>';
    return '<div class="pslot"><div class="pempty" style="font-size:0.3rem">EN ATTENTE</div>'+addBotBtn+'</div>';
  }).join("");
  var n=totalCount;
  document.getElementById("wait-status").textContent=n+" joueur"+(n>1?"s":"")+" connecte"+(n>1?"s":"");
  var btn=document.getElementById("btn-launch");
  btn.style.display=isHost?"block":"none";
  if(isHost) btn.textContent=n>=2?"LANCER LA PARTIE":"BESOIN DE 2+ JOUEURS";
  if(isHost&&db) db.from("bomberman_rooms").update({players:JSON.stringify(waitingPlayers),updated_at:new Date().toISOString()}).eq("code",roomCode).then(function(){}).catch(function(){});
}

function ajouterBot(){
  if(!isHost) return;
  var bots=["BOT Alpha","BOT Bravo","BOT Charlie","BOT Delta","BOT Echo","BOT Foxtrot"];
  var avatars=["🤖","👾","💀","🎮","⚡","🔥"];
  var existing=Object.values(waitingPlayers).filter(function(p){return p.isBot;}).length;
  if(Object.keys(waitingPlayers).length>=4) return;
  var bid="bot_"+Math.random().toString(36).slice(2,6);
  waitingPlayers[bid]={id:bid,pseudo:bots[existing%bots.length],avatar:avatars[existing%avatars.length],isBot:true};
  renderWaitingRoom();
  broadcastEvent("room_sync",{players:waitingPlayers});
  if(db) db.from("bomberman_rooms").update({players:JSON.stringify(waitingPlayers),updated_at:new Date().toISOString()}).eq("code",roomCode).then(function(){}).catch(function(){});
}

function retirerBot(bid){
  if(!isHost) return;
  delete waitingPlayers[bid];
  renderWaitingRoom();
  broadcastEvent("room_sync",{players:waitingPlayers});
}

function lancerPartie(){
  if(!isHost) return;
  if(Object.keys(waitingPlayers).length<2){
    toast("Ajoute au moins 1 BOT ou attends un joueur","err");
    return;
  }
  initGame(waitingPlayers);
  broadcastEvent("game_start",{gs:gs});
  if(db) db.from("bomberman_rooms").update({status:"playing",updated_at:new Date().toISOString()}).eq("code",roomCode).then(function(){}).catch(function(){});
  showScreen("screen-game");
  startGameLoop();
  // Heartbeat toutes les 60s pour éviter la suppression automatique
  if(isHost&&db){
    var heartbeat=setInterval(function(){
      if(!gs.running){clearInterval(heartbeat);return;}
      db.from("bomberman_rooms").update({updated_at:new Date().toISOString()}).eq("code",roomCode).catch(function(){});
    },60000);
  }
}

function quitterSalle(){
  broadcastEvent("player_leave",{id:myId,pseudo:myPseudo});
  if(channel){try{channel.unsubscribe();}catch(e){} channel=null;}
  if(isHost&&db) db.from("bomberman_rooms").delete().eq("code",roomCode).then(function(){}).catch(function(){});
  retourMenu();
}

function endGame(winnerId){
  if(gameLoop){clearInterval(gameLoop);gameLoop=null;}
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  gs.running=false; render();
  var winner=winnerId?gs.players[winnerId]:null;
  var ot=document.getElementById("ov-title");
  ot.textContent=winner?(winner.avatar+" "+winner.pseudo+" GAGNE!"):"TEMPS ECOULE";
  ot.style.color=winner?(winner.id===myId?"#ffe600":"#ff3e6c"):"#888";
  document.getElementById("game-overlay").classList.add("show");
  setTimeout(function(){
    document.getElementById("game-overlay").classList.remove("show");
    var sorted=Object.values(gs.players).sort(function(a,b){return b.kills-a.kills||(a.dead?1:-1);});
    var medals=["1er","2e","3e"];
    document.getElementById("result-podium").innerHTML=sorted.slice(0,4).map(function(p,i){ return '<div class="pod-card '+(i===0?"p1":i===1?"p2":"p3")+'"><div class="pod-rank">'+(medals[i]||"4e")+'</div><div style="font-size:1.4rem">'+p.avatar+'</div><div class="pod-name">'+p.pseudo+'</div><div class="pod-kills">'+p.kills+' kills</div></div>'; }).join("");
    showScreen("screen-results");
    if(db) db.from("bomberman_rooms").delete().eq("code",roomCode).then(function(){}).catch(function(){});
  },3000);
}

function envoyerChat(){ var inp=document.getElementById("chat-inp"),msg=inp.value.trim(); if(!msg) return; broadcastEvent("chat",{pseudo:myPseudo,msg:msg}); addChat(myPseudo+": "+msg,"player"); inp.value=""; }
function addChat(text,type){ var el=document.getElementById("chat-msgs"); if(!el) return; var d=document.createElement("div"); d.className="cm-"+(type||"player"); d.textContent=text; el.appendChild(d); el.scrollTop=el.scrollHeight; }
function showScreen(id){ document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");}); document.getElementById(id).classList.add("active"); if(id==="screen-game"){ document.body.classList.add("in-game"); resizeCanvas(); } else { document.body.classList.remove("in-game"); } }
function retourMenu(){ if(gameLoop){clearInterval(gameLoop);gameLoop=null;} if(timerInterval){clearInterval(timerInterval);timerInterval=null;} if(channel){try{channel.unsubscribe();}catch(e){} channel=null;} gs={map:[],players:{},bombs:[],explosions:[],powerups:[],running:false,timeLeft:GAME_DURATION}; keys={up:false,down:false,left:false,right:false,bomb:false}; isHost=false; roomCode=""; waitingPlayers={}; document.getElementById("game-overlay").classList.remove("show"); chargerSalles(); showScreen("screen-menu"); }
function genCode(){ var c="ABCDEFGHJKLMNPQRSTUVWXYZ"; return [0,1,2,3].map(function(){return c[Math.floor(Math.random()*c.length)];}).join(""); }
function toast(msg,type){ var el=document.createElement("div"); el.className="toast "+(type||""); el.textContent=msg; document.getElementById("toasts").appendChild(el); setTimeout(function(){el.remove();},3000); }
</script>
</body>
</html>
